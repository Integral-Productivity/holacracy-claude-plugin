name: Validate plugin manifest

# Gate every PR on `claude plugin validate` so a plugin that is valid JSON but
# invalid against the Claude Code plugin schema cannot reach `main`. Delegates
# to the org-wide reusable workflow in devops-excellence (ADR-038) so the gate
# stays DRY across every *-claude-plugin repo.
#
# `claude plugin validate` is a local, auth-free schema check (no API key, no
# login), so it needs no secrets.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    uses: Integral-Productivity/devops-excellence/.github/workflows/reusable-validate-plugin-manifest.yml@main
